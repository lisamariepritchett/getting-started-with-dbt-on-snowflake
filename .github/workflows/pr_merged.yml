name: PR Accepted Deployment
run-name: "${{ github.event_name == 'workflow_dispatch' && format('Manual prod run by {0}: {1} --select {2}', github.actor, github.event.inputs.dbt_command, github.event.inputs.dbt_select) || format('PR from {0} accepted', github.actor) }}"
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dbt_command:
        description: 'dbt command to run'
        required: true
        default: 'run'
        type: choice
        options:
          - run
          - build
          - test
      dbt_select:
        description: 'dbt --select argument (e.g. orders, tag:daily, +my_model)'
        required: true
      dbt_exclude:
        description: 'dbt --exclude argument (optional)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  run-snowflake-dbt-job:
    name: "Run on Accepted PR"
    runs-on: ubuntu-latest
    environment: prod # Must match the OIDC subject's environment
    env:
      SNOWFLAKE_CLI_FEATURES_ENABLE_DBT: true
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_DATABASE: TASTY_BYTES_STAGE_DB
      SNOWFLAKE_SCHEMA: PUBLIC

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          use-oidc: true

      - name: Check Snowflake CLI Version
        run: snow --version

      - name: Test Snowflake connection
        run: snow connection test -x

      - name: Determine what changed
        id: changes
        run: |
          # Manual dispatch: use user-provided selector
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=manual" >> $GITHUB_OUTPUT
            echo "dbt_command=${{ github.event.inputs.dbt_command }}" >> $GITHUB_OUTPUT
            echo "dbt_select=${{ github.event.inputs.dbt_select }}" >> $GITHUB_OUTPUT
            echo "dbt_exclude=${{ github.event.inputs.dbt_exclude }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Push trigger: detect what changed via git diff
          CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD)

          # Categorize changes
          MODEL_FILES=$(echo "$CHANGED_FILES" | grep '^tasty_bytes_dbt_demo/models/.*\.sql$' || true)
          TEST_FILES=$(echo "$CHANGED_FILES" | grep '^tasty_bytes_dbt_demo/models/.*\.yml$' || true)
          MACRO_FILES=$(echo "$CHANGED_FILES" | grep '^tasty_bytes_dbt_demo/macros/' || true)
          CONFIG_FILES=$(echo "$CHANGED_FILES" | grep -E '^tasty_bytes_dbt_demo/(dbt_project\.yml|packages\.yml|profiles\.yml)$' || true)
          DBT_FILES=$(echo "$CHANGED_FILES" | grep '^tasty_bytes_dbt_demo/' || true)

          if [ -n "$MODEL_FILES" ]; then
            # Extract model names and append + for downstream
            MODELS=$(echo "$MODEL_FILES" | sed 's|.*/||;s|\.sql||' | sed 's/$/ /' | tr -d '\n' | sed 's/ /+ /g' | sed 's/+ $/+/')
            echo "mode=build" >> $GITHUB_OUTPUT
            echo "models=$MODELS" >> $GITHUB_OUTPUT
          elif [ -n "$TEST_FILES" ] && [ -z "$MACRO_FILES" ] && [ -z "$CONFIG_FILES" ]; then
            # Extract folder paths relative to dbt project for --select path:
            TEST_PATHS=$(echo "$TEST_FILES" | sed 's|^tasty_bytes_dbt_demo/||' | xargs -I{} dirname {} | sort -u | sed 's/^/path:/' | tr '\n' ' ' | sed 's/ $//')
            echo "mode=test" >> $GITHUB_OUTPUT
            echo "test_select=$TEST_PATHS" >> $GITHUB_OUTPUT
          elif [ -n "$DBT_FILES" ]; then
            echo "mode=deploy_only" >> $GITHUB_OUTPUT
          else
            echo "mode=skip" >> $GITHUB_OUTPUT
          fi

      - name: Deploy dbt project object
        if: steps.changes.outputs.mode != 'skip' && steps.changes.outputs.mode != 'manual'
        run: snow dbt deploy tasty_bytes_dbt_object_gh_action --source ./tasty_bytes_dbt_demo --default-target prod --dbt-version 1.10.15 --force -x --install-local-deps --external-access-integration dbt_ext_access

      - name: Build changed models and downstream
        if: steps.changes.outputs.mode == 'build'
        run: snow dbt execute -x tasty_bytes_dbt_object_gh_action build --target prod --select ${{ steps.changes.outputs.models }}

      - name: Run tests for changed folders
        if: steps.changes.outputs.mode == 'test'
        run: snow dbt execute -x tasty_bytes_dbt_object_gh_action test --target prod --select ${{ steps.changes.outputs.test_select }}

      - name: Manual prod run
        if: steps.changes.outputs.mode == 'manual'
        run: |
          EXCLUDE_ARG=""
          if [ -n "${{ steps.changes.outputs.dbt_exclude }}" ]; then
            EXCLUDE_ARG="--exclude ${{ steps.changes.outputs.dbt_exclude }}"
          fi
          snow dbt execute -x tasty_bytes_dbt_object_gh_action ${{ steps.changes.outputs.dbt_command }} --target prod --select ${{ steps.changes.outputs.dbt_select }} $EXCLUDE_ARG

      - name: Deploy validated (config or macro change)
        if: steps.changes.outputs.mode == 'deploy_only'
        run: echo "Config/macro changes validated by successful deploy. No models to build."

      - name: No dbt changes detected
        if: steps.changes.outputs.mode == 'skip'
        run: echo "No dbt project changes detected, skipping."

      - name: List all dbt project objects
        if: steps.changes.outputs.mode != 'skip'
        run: snow dbt list -x
