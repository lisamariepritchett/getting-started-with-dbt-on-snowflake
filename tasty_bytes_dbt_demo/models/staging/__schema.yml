version: 2

models:
  - name: raw_customer_customer_loyalty
    description: 'Staging model for customer loyalty data'
    columns:
      - name: CUSTOMER_ID
        description: 'Primary key for customers'
        data_tests:
          - unique
          - not_null
      - name: FIRST_NAME
        description: 'Customer first name'
        data_tests:
          - not_null
      - name: LAST_NAME
        description: 'Customer last name'
        data_tests:
          - not_null
      - name: CITY
        description: 'Customer city'
      - name: COUNTRY
        description: 'Customer country'
        data_tests:
          - not_null
      - name: POSTAL_CODE
        description: 'Customer postal code'
      - name: PREFERRED_LANGUAGE
        description: 'Customer preferred language'
      - name: GENDER
        description: 'Customer gender'
      - name: FAVOURITE_BRAND
        description: 'Customer favourite food truck brand'
      - name: MARITAL_STATUS
        description: 'Customer marital status'
      - name: CHILDREN_COUNT
        description: 'Number of children'
      - name: SIGN_UP_DATE
        description: 'Loyalty program sign up date'
        data_tests:
          - not_null
      - name: BIRTHDAY_DATE
        description: 'Customer birthday'
      - name: E_MAIL
        description: 'Customer email address'
        data_tests:
          - unique
          - not_null
      - name: PHONE_NUMBER
        description: 'Customer phone number'

  - name: raw_pos_country
    description: 'Staging model for country reference data'
    columns:
      - name: COUNTRY_ID
        description: 'Country identifier'
        data_tests:
          - not_null
      - name: COUNTRY
        description: 'Country name'
        data_tests:
          - not_null
      - name: ISO_CURRENCY
        description: 'ISO currency code'
      - name: ISO_COUNTRY
        description: 'ISO country code'
        data_tests:
          - not_null
      - name: CITY_ID
        description: 'City identifier'
        data_tests:
          - unique
          - not_null
      - name: CITY
        description: 'City name'
      - name: CITY_POPULATION
        description: 'City population count'

  - name: raw_pos_franchise
    description: 'Staging model for franchise data'
    columns:
      - name: FRANCHISE_ID
        description: 'Primary key for franchises'
        data_tests:
          - unique
          - not_null
      - name: FIRST_NAME
        description: 'Franchise owner first name'
        data_tests:
          - not_null
      - name: LAST_NAME
        description: 'Franchise owner last name'
        data_tests:
          - not_null
      - name: CITY
        description: 'City where franchise is based'
      - name: COUNTRY
        description: 'Country where franchise is based'
      - name: E_MAIL
        description: 'Contact email'
        data_tests:
          - not_null
      - name: PHONE_NUMBER
        description: 'Contact phone number'

  - name: raw_pos_location
    description: 'Staging model for business locations'
    columns:
      - name: LOCATION_ID
        description: 'Primary key for locations'
        data_tests:
          - unique
          - not_null
      - name: PLACEKEY
        description: 'Standard location identifier'
        data_tests:
          - unique
      - name: LOCATION
        description: 'Location name'
        data_tests:
          - not_null
      - name: CITY
        description: 'City name'
        data_tests:
          - not_null
      - name: REGION
        description: 'Regional identifier'
      - name: ISO_COUNTRY_CODE
        description: 'ISO country code'
        data_tests:
          - not_null
      - name: COUNTRY
        description: 'Country name'
        data_tests:
          - not_null

  - name: raw_pos_menu
    description: 'Staging model for menu items'
    columns:
      - name: MENU_ID
        description: 'Primary key for menu items'
        data_tests:
          - unique
          - not_null
      - name: MENU_TYPE_ID
        description: 'Menu type reference'
        data_tests:
          - not_null
      - name: MENU_TYPE
        description: 'Type of menu'
      - name: TRUCK_BRAND_NAME
        description: 'Brand name for truck'
      - name: MENU_ITEM_ID
        description: 'Item identifier on menu'
        data_tests:
          - not_null
      - name: MENU_ITEM_NAME
        description: 'Name of menu item'
        data_tests:
          - not_null
      - name: ITEM_CATEGORY
        description: 'Category of food item'
      - name: COST_OF_GOODS_USD
        description: 'Cost to prepare item'
      - name: SALE_PRICE_USD
        description: 'Retail price of item'
      - name: MENU_ITEM_HEALTH_METRICS_OBJ
        description: 'Health metrics for menu item'

  - name: raw_pos_order_detail
    description: 'Staging model for order line items'
    columns:
      - name: ORDER_DETAIL_ID
        description: 'Primary key for order details'
        data_tests:
          - unique
          - not_null
      - name: ORDER_ID
        description: 'Foreign key to order header'
        data_tests:
          - not_null
          - relationships:
              to: ref('raw_pos_order_header')
              field: ORDER_ID
      - name: MENU_ITEM_ID
        description: 'Foreign key to menu'
        data_tests:
          - not_null
      - name: DISCOUNT_ID
        description: 'Optional discount applied'
      - name: LINE_NUMBER
        description: 'Line number on order'
        data_tests:
          - not_null
      - name: QUANTITY
        description: 'Quantity ordered'
        data_tests:
          - not_null
      - name: UNIT_PRICE
        description: 'Price per unit'
      - name: PRICE
        description: 'Total line price'
      - name: ORDER_ITEM_DISCOUNT_AMOUNT
        description: 'Discount amount for line'

  - name: raw_pos_order_header
    description: 'Staging model for order headers'
    columns:
      - name: ORDER_ID
        description: 'Primary key for orders'
        data_tests:
          - unique
          - not_null
      - name: TRUCK_ID
        description: 'Foreign key to truck'
        data_tests:
          - not_null
          - relationships:
              to: ref('raw_pos_truck')
              field: TRUCK_ID
      - name: LOCATION_ID
        description: 'Foreign key to location'
        data_tests:
          - not_null
          - relationships:
              to: ref('raw_pos_location')
              field: LOCATION_ID
      - name: CUSTOMER_ID
        description: 'Customer identifier'
      - name: DISCOUNT_ID
        description: 'Discount applied to order'
      - name: SHIFT_ID
        description: 'Shift identifier'
      - name: SHIFT_START_TIME
        description: 'Shift start time'
      - name: SHIFT_END_TIME
        description: 'Shift end time'
      - name: ORDER_CHANNEL
        description: 'Order channel (app, in-person)'
      - name: ORDER_TS
        description: 'Order timestamp'
        data_tests:
          - not_null
      - name: SERVED_TS
        description: 'Time order was served'
      - name: ORDER_CURRENCY
        description: 'Currency of the order'
        data_tests:
          - not_null
      - name: ORDER_AMOUNT
        description: 'Pre-tax order amount'
        data_tests:
          - not_null
      - name: ORDER_TAX_AMOUNT
        description: 'Tax amount'
      - name: ORDER_DISCOUNT_AMOUNT
        description: 'Discount amount'
      - name: ORDER_TOTAL
        description: 'Total order amount'
        data_tests:
          - not_null

  - name: raw_pos_truck
    description: 'Staging model for food truck data'
    columns:
      - name: TRUCK_ID
        description: 'Primary key for trucks'
        data_tests:
          - unique
          - not_null
      - name: MENU_TYPE_ID
        description: 'Type of menu on truck'
        data_tests:
          - not_null
      - name: PRIMARY_CITY
        description: 'Main city for truck'
        data_tests:
          - not_null
      - name: REGION
        description: 'Region where truck operates'
      - name: ISO_REGION
        description: 'ISO region code'
      - name: COUNTRY
        description: 'Country where truck operates'
        data_tests:
          - not_null
      - name: ISO_COUNTRY_CODE
        description: 'ISO country code'
      - name: FRANCHISE_FLAG
        description: 'Whether truck is franchised'
      - name: YEAR
        description: 'Year of truck manufacture'
        data_tests:
          - not_null
      - name: MAKE
        description: 'Truck manufacturer'
      - name: MODEL
        description: 'Truck model'
      - name: EV_FLAG
        description: 'Whether truck is electric'
      - name: FRANCHISE_ID
        description: 'Foreign key to franchise'
        data_tests:
          - relationships:
              to: ref('raw_pos_franchise')
              field: FRANCHISE_ID
      - name: TRUCK_OPENING_DATE
        description: 'Date truck began operations'
        data_tests:
          - not_null
